services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: skillmap-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/server.env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: skillmap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skillmap
      POSTGRES_USER: skillmap
      POSTGRES_PASSWORD: change-this-password
    ports:
      - "5432:5432"
    volumes:
      - skillmap-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillmap -d skillmap"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  skillmap-postgres-data:
