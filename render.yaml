services:
  - type: web
    name: skillmap-api
    runtime: python
    plan: free
    rootDir: apps/api
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    previews:
      generation: off
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillmap-db
          property: connectionString
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: FLASK_DEBUG
        value: "false"
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: skillmap-db
    plan: free
    region: singapore
    databaseName: skillmap
    user: skillmap
