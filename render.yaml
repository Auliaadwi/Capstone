services:
  - type: web
    name: skillmap-api
    runtime: node
    plan: free
    rootDir: apps/api
    region: singapore
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    previews:
      generation: off
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillmap-db
          property: connectionString
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: skillmap-db
    plan: free
    region: singapore
    databaseName: skillmap
    user: skillmap
